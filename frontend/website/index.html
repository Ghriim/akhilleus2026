<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akhilleus — Player</title>
    <script>
      // Apply the stored theme before first paint to avoid a flash. Default: "system".
      (function () {
        try {
          var t = localStorage.getItem('theme');
          document.documentElement.dataset.theme = 'basic' === t || 'system' === t ? t : 'system';
        } catch (e) {
          document.documentElement.dataset.theme = 'system';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
