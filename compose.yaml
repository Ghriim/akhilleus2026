name: akhilleus2026

services:
    database:
        image: mysql:8.4
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-akhilleus}
            MYSQL_USER: ${MYSQL_USER:-app}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
        ports:
            - "${MYSQL_HOST_PORT:-3306}:3306"
        volumes:
            - database_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
            interval: 5s
            timeout: 5s
            retries: 20

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /app
        volumes:
            - .:/app
        environment:
            DATABASE_URL: ${DATABASE_URL:-mysql://app:!ChangeMe!@database:3306/akhilleus?serverVersion=8.4}
            PHP_IDE_CONFIG: serverName=akhilleus2026
        ports:
            - "${APP_HOST_PORT:-8000}:8000"
        depends_on:
            database:
                condition: service_healthy

    frontend-admin:
        build:
            context: .
            dockerfile: docker/node/Dockerfile
        working_dir: /app
        volumes:
            - ./frontend/admin:/app
            - frontend_admin_node_modules:/app/node_modules
        environment:
            VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
        # Use host network so the npm registry is reachable on this machine
        # (the docker bridge does not forward outbound on this host's
        # current setup); Vite binds 0.0.0.0:5173 which is then the host's
        # :5173 directly. Drop this and use the bridge `ports:` mapping
        # again the day docker bridge networking is fixed on the host.
        network_mode: host

    frontend-website:
        build:
            context: .
            dockerfile: docker/node/Dockerfile
        working_dir: /app
        volumes:
            - ./frontend/website:/app
            - frontend_website_node_modules:/app/node_modules
        environment:
            VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
        # Same host-network rationale as frontend-admin (Vite binds
        # 0.0.0.0:5174 — see vite.config.ts — to avoid colliding with
        # the admin's 5173).
        network_mode: host

volumes:
    database_data:
    frontend_admin_node_modules:
    frontend_website_node_modules:
